<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>日程块</title>
  </head>
  <body>
    <div id="app"></div>
    <!-- iframe 首次点击时浏览器先转移焦点，可能打断 FullCalendar PointerDragging 的
         down→up 序列，导致 dateClick/select/event drag 失效。在捕获阶段提前 focus
         iframe，确保后续释放事件正常到达，不影响单击空白不新建的设计。 -->
    <script>
      (function () {
        function focusFrame() {
          try {
            window.focus();
          } catch (err) {
            // 忽略宿主环境拒绝 focus 的情况。
          }
        }
        document.addEventListener('pointerdown', focusFrame, true);
        document.addEventListener('mousedown', focusFrame, true);
        document.addEventListener('touchstart', focusFrame, { capture: true, passive: true });
      })();
    </script>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
